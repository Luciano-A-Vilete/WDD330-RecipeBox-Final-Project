<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBox – Smart Recipe Finder</title>
    <!-- Google Fonts: DM Sans (body) + Caveat (accent/brand) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- ===== HEADER / NAV ===== -->
    <header>
        <div class="header-inner">
            <h1><span aria-hidden="true">🍴</span> RecipeBox</h1>
            <nav aria-label="Main navigation">
                <!-- href targets real section IDs so fragment links are valid -->
                <a href="#search-section" class="nav-link active" data-section="search" aria-current="page">Search</a>
                <a href="#favorites-section" class="nav-link" data-section="favorites">Favorites</a>
            </nav>
        </div>
    </header>

    <main>

        <!-- ===== FEATURED RECIPE (loaded on page load) ===== -->
        <section id="featured-section" aria-label="Featured recipe">
            <div id="featured-card" class="featured-card"></div>
        </section>

        <!-- ===== SEARCH SECTION ===== -->
        <section id="search-section" aria-label="Recipe search">
            <form id="search-form" class="search-form" novalidate>

                <!-- <label> provides the accessible name — no aria-label needed on the input -->
                <label for="search-input" class="sr-only">Search recipes</label>
                <input type="search" id="search-input" class="search-input"
                    placeholder="Search by ingredient, dish, or cuisine..."
                    autocomplete="off">

                <div class="filters">
                    <select id="diet-filter" aria-label="Dietary restriction">
                        <option value="">All Diets</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="gluten free">Gluten Free</option>
                        <option value="ketogenic">Ketogenic</option>
                        <option value="paleo">Paleo</option>
                    </select>

                    <select id="cuisine-filter" aria-label="Cuisine type">
                        <option value="">All Cuisines</option>
                        <option value="italian">Italian</option>
                        <option value="mexican">Mexican</option>
                        <option value="asian">Asian</option>
                        <option value="american">American</option>
                        <option value="mediterranean">Mediterranean</option>
                    </select>
                </div>

                <button type="submit" class="btn-search">Search Recipes</button>
            </form>
        </section>

        <!-- ===== RESULTS SECTION ===== -->
        <!-- aria-live="polite" announces new results to screen readers -->
        <section id="results-section" aria-live="polite" aria-label="Search results">
            <div id="loading" class="loading hidden" role="status">
                <div class="spinner" aria-hidden="true"></div>
                <p>Finding recipes...</p>
            </div>
            <div id="results-grid" class="results-grid" role="list"></div>
        </section>

        <!-- ===== FAVORITES SECTION (hidden by default) ===== -->
        <section id="favorites-section" class="hidden" aria-label="Saved favorites">
            <div class="fav-header">
                <h2 class="fav-title">My Favorites</h2>
                <span id="fav-count" class="fav-count" aria-live="polite" aria-atomic="true"></span>
                <button id="fav-clear" class="fav-clear hidden" aria-label="Clear all favorites">
                    Clear all
                </button>
            </div>
            <div id="favorites-grid" class="results-grid" role="list"></div>
        </section>

    </main>

    <!-- ===== RECIPE DETAIL MODAL ===== -->
    <!-- Native <dialog> element = best practice for accessible modals.
         aria-label provides a static name; when JS injects modal-title,
         aria-labelledby on the rendered h2 gives the specific recipe name. -->
    <dialog id="recipe-modal" class="recipe-modal" aria-label="Recipe details">
        <button class="modal-close" aria-label="Close recipe details">&#x2715;</button>
        <div id="modal-content" class="modal-content"></div>
    </dialog>

    <!-- ===== BOTTOM TAB BAR (mobile only, hidden via CSS on desktop) ===== -->
    <nav class="bottom-nav" aria-label="Tab navigation">
        <a href="#search-section" class="bottom-tab active" data-section="search" aria-current="page">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <span>Search</span>
        </a>
        <a href="#favorites-section" class="bottom-tab" data-section="favorites">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <span>Favorites</span>
        </a>
    </nav>

    <!-- type="module" enables ES6 import/export -->
    <script type="module" src="js/app.js"></script>

</body>

</html>
