name: Deploy to GitHub Pages

# Runs on every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the workflow permission to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; don't cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Keys are stored in GitHub repository secrets (Settings → Secrets → Actions).
      # Node.js writes them into js/config.js inside the CI runner — this file
      # is never committed to the repository or visible in git history.
      - name: Inject API keys into config.js
        env:
          SPOONACULAR_API_KEY: ${{ secrets.SPOONACULAR_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          const content = [
            '// Auto-generated by CI — do not commit this file.',
            \`export const SPOONACULAR_API_KEY = '\${process.env.SPOONACULAR_API_KEY}';\`,
            \`export const USDA_API_KEY = '\${process.env.USDA_API_KEY}';\`,
          ].join('\n') + '\n';
          fs.writeFileSync('js/config.js', content);
          console.log('config.js generated.');
          "

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
